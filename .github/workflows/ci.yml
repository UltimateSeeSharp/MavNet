name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MavNet.slnx

      - name: Build
        run: dotnet build MavNet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MavNet.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Verify codegen produces no drift
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          dotnet run --project tools/MavNet.CodeGen --configuration Release
          if [[ -n "$(git status --porcelain src/MavNet.Protocol.Generated src/MavNet.Protocol/Generated)" ]]; then
            echo "::error::Generated files drifted from the committed copy. Run 'dotnet run --project tools/MavNet.CodeGen' locally and commit the result."
            git --no-pager diff src/MavNet.Protocol.Generated src/MavNet.Protocol/Generated
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/test-results.trx'
